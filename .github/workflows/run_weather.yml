# ... (rest of the file stays the same until the services section)
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password123 # Simple password for the Cloud DB
          POSTGRES_DB: weather_db
        ports:
          - 5432:5432
# ... (rest of the file stays the same until the Run Script step)
      - name: Run Weather Script
        env:
          DB_PASS: password123  # This tells Python to use 'password123' on GitHub
          DB_HOST: localhost
        run: python weather_tracker.py